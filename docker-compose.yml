services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./core-api/sqlc/schema_tracks.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - music-net

  kafka:
    image: apache/kafka:3.7.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:${KAFKA_EXTERNAL_PORT:-9094}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [
        "CMD-SHELL",
        "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
      ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - music-net

  core-api:
    build:
      context: .
      dockerfile: core-api/Dockerfile
    restart: unless-stopped
    environment:
      CORE_API_PORT: ${CORE_API_PORT:-8000}
      CORE_API_READ_HEADER_TIMEOUT: ${CORE_API_READ_HEADER_TIMEOUT:-5s}
      CORE_API_READ_TIMEOUT: ${CORE_API_READ_TIMEOUT:-15s}
      CORE_API_WRITE_TIMEOUT: ${CORE_API_WRITE_TIMEOUT:-15s}
      CORE_API_IDLE_TIMEOUT: ${CORE_API_IDLE_TIMEOUT:-60s}
      CORE_API_UPLOAD_MAX_BYTES: ${CORE_API_UPLOAD_MAX_BYTES:-52428800}
      CORE_API_DOWNLOAD_URL_EXPIRES: ${CORE_API_DOWNLOAD_URL_EXPIRES:-15m}
      CORE_API_TRANSCODE_JOB_PRIORITY: ${CORE_API_TRANSCODE_JOB_PRIORITY:-1}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-ru-1}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-core}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_TRANSCODE_TOPIC: ${KAFKA_TRANSCODE_TOPIC:-transcode-jobs}
      KAFKA_WRITE_TIMEOUT: ${KAFKA_WRITE_TIMEOUT:-10s}
      KAFKA_READ_TIMEOUT: ${KAFKA_READ_TIMEOUT:-10s}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${CORE_API_PORT}:${CORE_API_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 2 -O - http://127.0.0.1:${CORE_API_PORT}/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - music-net
  
  playback-api:
    build:
      context: ./playback-api
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-core}
      KAFKA_BROKERS: kafka:9092
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:                            
        condition: service_healthy
    ports:
      - "8001:8000"
    networks:
      - music-net
  
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - music-net

  frontend:
    build: ./frontend
    container_name: music-frontend
    ports:
      - "80:80"
    networks:
      - music-net
    depends_on:
      - core-api

  mock-api:
    image: alpine
    container_name: mock-api
    command: ["sleep", "infinity"]
    networks:
      - music-net

  mock-tracking:
    image: alpine
    container_name: mock-tracking
    command: ["sleep", "infinity"]
    networks:
      - music-net

  mock-analytics:
    image: alpine
    container_name: mock-analytics
    command: ["sleep", "infinity"]
    networks:
      - music-net

volumes:
  pgdata:
  kafka_data:

networks:
  music-net:
    driver: bridge