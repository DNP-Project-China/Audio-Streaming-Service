services:
  postgres:
    image: postgres:15
    container_name: music-postgres
    environment:
      POSTGRES_USER: music_user
      POSTGRES_PASSWORD: music_pass
      POSTGRES_DB: music_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - music-net

  minio:
    image: minio/minio:latest
    container_name: music-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - music-net

  redis:
    image: redis:7-alpine
    container_name: music-redis
    ports:
      - "6379:6379"
    networks:
      - music-net

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: music-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - music-net

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: music-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - music-net

  frontend:
    build: ./frontend
    container_name: music-frontend
    ports:
      - "80:80"
    networks:
      - music-net

  mock-api:
    image: alpine
    container_name: mock-api
    command: ["sleep", "infinity"]
    networks:
      - music-net

  mock-tracking:
    image: alpine
    container_name: mock-tracking
    command: ["sleep", "infinity"]
    networks:
      - music-net

  mock-analytics:
    image: alpine
    container_name: mock-analytics
    command: ["sleep", "infinity"]
    networks:
      - music-net

volumes:
  postgres_data:
  minio_data:

networks:
  music-net:
    driver: bridge