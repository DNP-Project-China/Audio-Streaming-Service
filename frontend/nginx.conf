server {
    listen 80;
    client_max_body_size 50M;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 5s;

    location / {
        try_files $uri /index.html;
    }

    location = /api/upload {
        proxy_pass http://core-api:8000/upload;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://core-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /tracking/ {
        proxy_pass http://playback-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /stats/live {
        set $statistics_host statistics-api;
        rewrite ^ /stats break;
        proxy_pass http://$statistics_host:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /stats/ {
        set $statistics_host statistics-api;
        proxy_pass http://$statistics_host:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}